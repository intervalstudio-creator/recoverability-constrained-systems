<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Boundary Medication Module</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7f9; color: #111; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); margin-bottom: 18px; }
    h1, h2 { margin: 0 0 12px 0; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 18px; }
    label { display: block; font-size: 14px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button { border: 0; border-radius: 12px; padding: 10px 14px; cursor: pointer; font-weight: 700; }
    .primary { background: #111; color: #fff; }
    .secondary { background: #e9edf3; color: #111; }
    select { padding: 8px 10px; border-radius: 10px; }
    .decision { font-size: 28px; font-weight: 800; }
    .ok { color: #0a7a2f; }
    .stop { color: #9a6500; }
    .bad { color: #a40022; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f3f5f7; padding: 12px; border-radius: 12px; }
    ul { margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Medication / Withdrawal</h1>
      <p>Evaluate whether medication continuation remains admissible under real conditions.</p>
      <div class="row">
        <label>Medication class
          <select id="medication_class">
            <option value="benzodiazepine">Benzodiazepine</option>
            <option value="acute">Acute life-critical</option>
            <option value="balance">Balance-constrained</option>
            <option value="polypharmacy">Polypharmacy</option>
            <option value="cumulative">Cumulative</option>
          </select>
        </label>
      </div>
    </div>

    <div class="card">
      <h2>Required conditions</h2>
      <div class="grid">
        <label><input type="checkbox" id="dose_known" checked> Dose known</label>
        <label><input type="checkbox" id="duration_known" checked> Duration known</label>
        <label><input type="checkbox" id="patient_state_known"> Patient state known</label>
        <label><input type="checkbox" id="co_medications_known"> Co-medications known</label>
        <label><input type="checkbox" id="monitoring_present"> Monitoring present</label>
        <label><input type="checkbox" id="access_continuity"> Access continuity</label>
        <label><input type="checkbox" id="intervention_available" checked> Intervention available</label>
        <label><input type="checkbox" id="withdrawal_risk_bounded"> Risk bounded</label>
        <label><input type="checkbox" id="time_to_irreversibility_known" checked> Time window known</label>
        <label><input type="checkbox" id="response_within_window" checked> Response within window</label>
        <label><input type="checkbox" id="recovery_path_exists"> Recovery path exists</label>
      </div>
      <div class="row" style="margin-top:14px;">
        <button class="primary" onclick="runEvaluation()">Evaluate</button>
        <button class="secondary" onclick="loadBenzoFailure()">Load benzo failure preset</button>
      </div>
    </div>

    <div class="card">
      <h2>Decision</h2>
      <div id="decision" class="decision">—</div>
      <div id="action"></div>
      <ul id="reasons"></ul>
    </div>

    <div class="card">
      <h2>Raw output</h2>
      <pre id="output"></pre>
    </div>
  </div>

  <script src="../medication_engine.js"></script>
  <script>
    function getInput() {
      return {
        case_type: "medication_withdrawal",
        medication_class: document.getElementById("medication_class").value,
        dose_known: document.getElementById("dose_known").checked,
        duration_known: document.getElementById("duration_known").checked,
        patient_state_known: document.getElementById("patient_state_known").checked,
        co_medications_known: document.getElementById("co_medications_known").checked,
        monitoring_present: document.getElementById("monitoring_present").checked,
        access_continuity: document.getElementById("access_continuity").checked,
        intervention_available: document.getElementById("intervention_available").checked,
        withdrawal_risk_bounded: document.getElementById("withdrawal_risk_bounded").checked,
        time_to_irreversibility_known: document.getElementById("time_to_irreversibility_known").checked,
        response_within_window: document.getElementById("response_within_window").checked,
        recovery_path_exists: document.getElementById("recovery_path_exists").checked,
        substitution_attempted: false,
        substitution_verified: false
      };
    }

    function render(result) {
      const decisionEl = document.getElementById("decision");
      decisionEl.textContent = result.decision;
      decisionEl.className = "decision " + (result.decision === "CONTINUE" ? "ok" : result.decision === "STOP" ? "stop" : "bad");
      document.getElementById("action").textContent = "Action: " + result.action;

      const ul = document.getElementById("reasons");
      ul.innerHTML = "";
      result.reasons.forEach(r => {
        const li = document.createElement("li");
        li.textContent = r;
        ul.appendChild(li);
      });

      document.getElementById("output").textContent = JSON.stringify(result, null, 2);
    }

    function runEvaluation() {
      render(evaluateMedication(getInput()));
    }

    function loadBenzoFailure() {
      const p = medicationPresetBenzoFailure();
      document.getElementById("medication_class").value = p.medication_class;
      Object.keys(p).forEach(k => {
        const el = document.getElementById(k);
        if (el && el.type === "checkbox") el.checked = !!p[k];
      });
      render(evaluateMedication(p));
    }
  </script>
</body>
</html>
